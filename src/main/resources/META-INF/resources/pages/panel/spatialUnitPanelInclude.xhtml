<ui:fragment xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:spatialUnit="http://xmlns.jcp.org/jsf/composite/pages/spatialUnit/components"
                xmlns:cc="http://xmlns.jcp.org/jsf/composite"
>

        <p:growl id="growl" showDetail="true"/>
        <!-- Content -->
        <p:staticMessage severity="error" summary="Error" closable="false"
                         detail="#{bean.spatialUnitErrorMessage}"
                         rendered="#{not empty bean.spatialUnitErrorMessage}"/>
        <h:panelGroup id="contentPanel" rendered="#{bean.spatialUnit != null}">
            <h2>#{bean.spatialUnit.name}
                <p:chip label="#{bean.spatialUnit.category.label}" icon="pi pi-map-marker"
                        styleClass="mr-2"/>
            </h2>
            <p>ARK ID: #{bean.spatialUnit.ark.arkId}</p>
            <h:form>
                <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                <p:outputPanel>
                    <div class="card">
                        <p:toolbar>
                            <p:toolbarGroup>
                                <p:commandButton value='Nouvelle action' icon="pi pi-plus"
                                                 action="#{newActionUnitBean.reinit(bean.spatialUnit)}"
                                                 oncomplete="PF('new-action-unit-dialog').show()"
                                                 style="margin-right: .5rem">
                                </p:commandButton>
                            </p:toolbarGroup>
                        </p:toolbar>
                    </div>
                </p:outputPanel>
            </h:form>
            <p:tabView>
                <p:tab title="Aperçu">
                    <p:chart value="#{bean.barModel}" style="width: 100%; height: 500px;">

                    </p:chart>
                </p:tab>
                <p:tab title="Détails">
                </p:tab>
                <p:tab title="Hierarchie">
                    <div class="row siamois-row">
                        <div class="col-md-6">
                            <p:staticMessage severity="error" summary="Error" closable="false"
                                             detail="#{bean.spatialUnitListErrorMessage}"
                                             rendered="#{not empty bean.spatialUnitListErrorMessage}"/>
                            <spatialUnit:spatialUnitList
                                    header="Contient"
                                    spatialUnitList="#{bean.spatialUnitList}">
                                <f:facet name="toolbar">
                                    <p:toolbar>
                                        <p:toolbarGroup>
                                            <p:commandButton value='Nouveau lieu enfant' icon="pi pi-plus"
                                                             actionListener="#{spatialUnitFieldBean.init([bean.spatialUnit],[])}"
                                                             oncomplete="PF('new-spatial-unit-dialog').show()"
                                                             style="margin-right: .5rem">
                                            </p:commandButton>
                                        </p:toolbarGroup>
                                    </p:toolbar>
                                </f:facet>
                            </spatialUnit:spatialUnitList>
                        </div>
                        <div class="col-md-6">
                            <p:staticMessage severity="error" summary="Error" closable="false"
                                             detail="#{bean.spatialUnitListErrorMessage}"
                                             rendered="#{not empty bean.spatialUnitListErrorMessage}"/>
                            <spatialUnit:spatialUnitList
                                    header="Fait partie de"
                                    spatialUnitList="#{bean.spatialUnitParentsList}">
                                <f:facet name="toolbar">
                                    <p:toolbar>
                                        <p:toolbarGroup>
                                            <p:commandButton value='Nouveau lieu parent' icon="pi pi-plus"
                                                             actionListener="#{spatialUnitFieldBean.init([],[bean.spatialUnit])}"
                                                             oncomplete="PF('new-spatial-unit-dialog').show()"
                                                             style="margin-right: .5rem">
                                            </p:commandButton>
                                        </p:toolbarGroup>
                                    </p:toolbar>
                                </f:facet>
                            </spatialUnit:spatialUnitList>
                        </div>
                    </div>
                </p:tab>
                <p:tab title="Actions">
                    <div class="row siamois-rows">
                        <div class="col-md-12">
                            <p:staticMessage severity="error" summary="Error" closable="false"
                                             detail="#{bean.actionUnitListErrorMessage}"
                                             rendered="#{not empty bean.actionUnitListErrorMessage}"/>
                            <h:form>
                                <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                                <p:outputPanel>
                                    <div class="card">
                                        <p:toolbar>
                                            <p:toolbarGroup>
                                                <p:commandButton value='Nouveau' icon="pi pi-plus"
                                                                 action="#{newActionUnitBean.reinit(bean.spatialUnit)}"
                                                                 oncomplete="PF('new-action-unit-dialog').show()"
                                                                 style="margin-right: .5rem">
                                                </p:commandButton>
                                            </p:toolbarGroup>
                                        </p:toolbar>
                                        <p:dataTable paginator="true" paginatorPosition="bottom" rows="10" var="item"
                                                     value="#{bean.actionUnitList}">
                                            <f:facet name="header">
                                                Actions
                                            </f:facet>
                                            <p:column headerText="Name">
                                                <p:link outcome="/pages/actionUnit/actionUnit.xhtml"
                                                        value="#{item.name}">
                                                    <f:param name="id" value="#{item.id}"/>
                                                </p:link>
                                            </p:column>
                                            <p:column headerText="Type">
                                                <p:chip label="#{item.type.label}" icon="pi pi-play" styleClass="mr-2"/>
                                            </p:column>
                                        </p:dataTable>
                                    </div>
                                </p:outputPanel>
                            </h:form>
                        </div>
                    </div>
                </p:tab>
                <p:tab title="Enregistrements">
                    <div class="row siamois-row">
                        <div class="col-md-12">
                            <form>
                                <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                                <p:outputPanel>
                                    <div class="card">
                                        <p:staticMessage severity="error" summary="Error" closable="false"
                                                         detail="#{bean.recordingUnitListErrorMessage}"
                                                         rendered="#{not empty bean.recordingUnitListErrorMessage}"/>
                                        <p:dataTable paginator="true" paginatorPosition="bottom" rows="10" var="item"
                                                     value="#{bean.recordingUnitList}">
                                            <f:facet name="header">
                                                Unités d'enregistrement
                                            </f:facet>
                                            <p:column headerText="Name">
                                                <p:link outcome="/pages/recordingUnit/recordingUnit.xhtml"
                                                        value="#{item.identifier}">
                                                    <f:param name="id" value="#{item.id}"/>
                                                </p:link>
                                            </p:column>
                                            <p:column headerText="ARK">
                                                <h:outputText value="#{item.ark.arkId}"/>
                                            </p:column>
                                            <p:column headerText="Type">
                                                <p:chip label="#{item.type.label}" icon="pi pi-file" styleClass="mr-2"/>
                                            </p:column>
                                            <p:column headerText="Auteur">
                                                <h:outputText value="#{item.author.name} #{item.author.lastname}"/>
                                            </p:column>
                                            <p:column headerText="Fouilleur">
                                                <h:outputText
                                                        value="#{item.excavator.name} #{item.excavator.lastname}"/>
                                            </p:column>
                                        </p:dataTable>
                                    </div>
                                </p:outputPanel>
                            </form>
                        </div>
                        <!-- Table des unités action -->
                    </div>
                </p:tab>
                <p:tab title="Prelevements">
                </p:tab>
                <p:tab title="Versions">
                    <h:form>
                        <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                        <p:dataTable var="version" value="#{bean.historyVersion}" rows="5" paginator="true">
                            <p:column headerText="Date de la version">
                                <h:outputText value="#{bean.formatDate(version.updateTime)}"/>
                            </p:column>
                            <p:column>
                                <p:commandButton
                                        value="Visualiser"
                                        action="#{bean.visualise(version)}"

                                        oncomplete="PF('displayVersion').show()"
                                />
                            </p:column>
                            <p:column>
                                <p:commandButton
                                        value="Restaurer"
                                        immediate="true"
                                        action="#{bean.restore(version)}"
                                        oncomplete="PF('restored-dlg').show()"/>
                            </p:column>
                        </p:dataTable>
                    </h:form>
                </p:tab>
            </p:tabView>
        </h:panelGroup>
        <p:dialog id="idDisplayVersion" widgetVar="displayVersion" closeOnEscape="true">
            <h:form id="displayVersionForm">
                <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                <h:panelGroup id="versionVisualizer" rendered="#{bean.revisionToDisplay != null}">
                    <p>Name : #{bean.revisionToDisplay.name}</p>
                    <p>Ark : #{bean.revisionToDisplay.ark.arkId}</p>
                    <p>Category : #{bean.revisionToDisplay.category.label}</p>
                </h:panelGroup>
            </h:form>
        </p:dialog>
        <p:dialog widgetVar="restored-dlg" closeOnEscape="true" onHide="location.reload();">
            <h:outputText value="Version restaurée"/>
        </p:dialog>
        <ui:include src="../../dialog/actionUnit/actionUnitDialog.xhtml"/>
        <ui:include src="../../dialog/spatialUnit/newSpatialUnitDialog.xhtml"/>

</ui:fragment>
