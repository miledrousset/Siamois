<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:cc="http://xmlns.jcp.org/jsf/composite"
>

    <cc:interface>
        <cc:attribute name="actionUnitPanel" required="true"/>
    </cc:interface>

    <cc:implementation>
        <h:outputScript library="primefaces" name="jquery/jquery.js"/>

        <!-- Content -->

        <!-- General description of the action unit -->
        <p:staticMessage severity="error" summary="Error" closable="false"
                         detail="#{cc.attrs.actionUnitPanel.actionUnitErrorMessage}"
                         rendered="#{not empty cc.attrs.actionUnitPanel.actionUnitErrorMessage}"/>

        <h:panelGroup id="contentPanel" rendered="#{cc.attrs.actionUnitPanel.actionUnit != null}">

            <h:form>
                <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                <h2>#{cc.attrs.actionUnitPanel.actionUnit.name}
                    <p:chip rendered="#{!cc.attrs.actionUnitPanel.editType}" label="#{cc.attrs.actionUnitPanel.actionUnit.type.label}"
                            icon="pi pi-play"
                            styleClass="edit-type-chip">
                        <p:ajax event="select" listener="#{cc.attrs.actionUnitPanel.setEditType(true)}" update="@form"/>
                    </p:chip>
                    <p:autoComplete id="auto-complete-action-type"
                                    rendered="#{cc.attrs.actionUnitPanel.editType}"
                                    value="#{cc.attrs.actionUnitPanel.FType}"
                                    completeMethod="#{newcc.attrs.actionUnitPanel.completeActionUnitType}"
                                    var="field" itemLabel="#{field.label}"
                                    itemValue="#{field}"
                                    required="true"
                                    converter="#{conceptConverter}"
                                    forceSelection="true"
                                    scrollHeight="300"
                                    dropdown="true"/>
                </h2>
            </h:form>

            <p>ARK ID: #{cc.attrs.actionUnitPanel.actionUnit.ark.arkId}</p>
            <!-- Button to access recording unit form -->
            <h:form>
                <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                <p:commandButton value="Nouvelle unité d'enregistrement"
                                 icon="pi pi-add"
                                 actionListener="#{panelManagerBean.addNewRecordingUnitPanel(cc.attrs.actionUnitPanel.actionUnit)}"
                                 update="panelContainer"/>
            </h:form>


            <p:tabView id="spatialUnitTabsId">

                <p:tab title="Aperçu">

                </p:tab>

                <p:tab title="Détails" id="spatialUnitDetailsTabId">
                    <!-- Action codes (OA, OP, ...) -->
                    <h3>Manage Codes</h3>
                    <!-- The primary code attached to this action -->
                    <h4>Main code</h4>

                    <h:form id="primaryCodeForm">
                        <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>

                        <div style="display:flex;">
                            <p:chip label="#{cc.attrs.actionUnitPanel.actionUnit.primaryActionCode.type.label}"
                                    icon="pi pi-qrcode" >
                            </p:chip>

                            <p:autoComplete id="auto-complete-primary-action-code"
                                            value="#{cc.attrs.actionUnitPanel.actionUnit.primaryActionCode}"
                                            var="actionCode" itemLabel="#{actionCode.code}"
                                            completeMethod="#{cc.attrs.actionUnitPanel.completeActionCode}"
                                            converter="#{actionCodeConverter}"
                                            itemValue="#{actionCode}"
                                            required="true"
                                            forceSelection="true"
                                            scrollHeight="300"
                                            dropdown="false">
                                <p:ajax event="itemSelect"
                                        update="@form"/>
                                <p:column>
                                    <div style="display:flex;">
                                        <span class="pi pi-qrcode ui-chip ui-chip-icon"/>
                                        <div style="width:max-content;" class="ui-chip-text">#{actionCode.type.label}
                                        </div>
                                    </div>

                                </p:column>
                                <p:column>
                                        <span>
                                            #{actionCode.code}
                                        </span>
                                </p:column>
                                <f:facet name="footer">
                                    <div class="ui-fluid" style="padding:0.5rem 1rem 1rem 1rem">
                                        <p:commandButton value='Nouveau code' icon="pi pi-plus"
                                                         action="#{cc.attrs.actionUnitPanel.initNewActionCode(0)}"
                                                         update="form-new-action-code"
                                                         immediate="true"
                                                         oncomplete="PF('new-action-code-dialog').show()"
                                                         style="margin-right: .5rem">
                                        </p:commandButton>

                                    </div>
                                </f:facet>
                            </p:autoComplete>
                        </div>
                    </h:form>

                    <h4>Additional codes</h4>
                    <h:messages id="msg"></h:messages>
                    <h:form id="secondaryCodesForm">
                        <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                        <p:commandButton value="Add new code" icon="pi pi-plus" process="@this" update="secondaryCodesForm"
                                         action="#{cc.attrs.actionUnitPanel.addNewSecondaryCode}"/>
                        <ui:repeat id="secondaryCodeRepeat" var="secondaryCode" value="#{cc.attrs.actionUnitPanel.secondaryActionCodes}" varStatus="status">
                            <h:panelGroup style="display:flex;" id="secondaryCodeField">
                                <p:chip label="#{cc.attrs.actionUnitPanel.secondaryActionCodes[status.index].type.label}"
                                        icon="pi pi-qrcode" >
                                </p:chip>
                                <p:autoComplete id="SecondaryCodeAutoCompleteId"
                                                value="#{cc.attrs.actionUnitPanel.secondaryActionCodes[status.index]}"
                                                var="actionCode"
                                                itemLabel="#{actionCode.code}"
                                                completeMethod="#{cc.attrs.actionUnitPanel.completeActionCode}"
                                                converter="#{actionCodeConverter}"
                                                itemValue="#{actionCode}"
                                                required="true"
                                                forceSelection="true"
                                                scrollHeight="300"
                                                dropdown="false">
                                    <!--                                    <p:ajax event="itemSelect"-->
                                    <!--                                            listener="#{cc.attrs.actionUnitPanel.handleSelectPrimaryCode}"-->
                                    <!--                                          -->
                                    <p:ajax event="itemSelect"
                                            update="spatialUnitTabsId:secondaryCodesForm:secondaryCodeRepeat:#{status.index}:secondaryCodeField"/>
                                    />
                                    <p:column>
                                        <div style="display:flex;">
                                            <span class="pi pi-qrcode ui-chip ui-chip-icon"/>
                                            <div style="width:max-content;" class="ui-chip-text">#{actionCode.type.label}
                                            </div>
                                        </div>

                                    </p:column>
                                    <p:column>
                                        <span>
                                            #{actionCode.code}
                                        </span>
                                    </p:column>
                                    <f:facet name="footer">
                                        <div class="ui-fluid" style="padding:0.5rem 1rem 1rem 1rem">
                                            <p:commandButton value='Nouveau code' icon="pi pi-plus"
                                                             immediate="true"
                                                             update="form-new-action-code"
                                                             action="#{cc.attrs.actionUnitPanel.initNewActionCode(status.index+1)}"
                                                             oncomplete="PF('new-action-code-dialog').show()"
                                                             style="margin-right: .5rem">
                                            </p:commandButton>

                                        </div>
                                    </f:facet>
                                </p:autoComplete>
                                <p:commandButton icon="pi pi-minus" process="@this" update="@form"
                                                 action="#{cc.attrs.actionUnitPanel.removeSecondaryCode(status.index)}"/>
                            </h:panelGroup>
                        </ui:repeat>
                    </h:form>
                    <h:form>
                        <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                        <p:commandButton icon="pi pi-save" update="primaryCodeForm secondaryCodeForm main-growl"
                                         action="#{cc.attrs.actionUnitPanel.save()}"/>
                    </h:form>


                </p:tab>

                <p:tab title="Hierarchie">

                </p:tab>

                <p:tab title="Equipe">

                </p:tab>

                <p:tab title="Enregistrements">

                </p:tab>

                <p:tab title="Prelevements">

                </p:tab>

            </p:tabView>

        </h:panelGroup>

        <!-- Tabs -->


        <ui:include src="../../dialog/actionUnit/newActionCodeDialog.xhtml"/>


    </cc:implementation>
</ui:composition>
