<ui:fragment template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:cc="http://xmlns.jcp.org/jsf/composite"
>


        <h:outputScript library="primefaces" name="jquery/jquery.js"/>

        <!-- Content -->

        <!-- General description of the action unit -->
        <p:staticMessage severity="error" summary="Error" closable="false"
                         detail="#{bean.actionUnitErrorMessage}"
                         rendered="#{not empty bean.actionUnitErrorMessage}"/>

        <h:panelGroup id="contentPanel" rendered="#{bean.actionUnit != null}">

            <h:form>
                <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                <h2>#{bean.actionUnit.name}
                    <p:chip rendered="#{!bean.editType}" label="#{bean.actionUnit.type.label}"
                            icon="pi pi-play"
                            styleClass="edit-type-chip">
                        <p:ajax event="select" listener="#{bean.setEditType(true)}" update="@form"/>
                    </p:chip>
                    <p:autoComplete id="auto-complete-action-type"
                                    rendered="#{bean.editType}"
                                    value="#{bean.FType}"
                                    completeMethod="#{newbean.completeActionUnitType}"
                                    var="field" itemLabel="#{field.label}"
                                    itemValue="#{field}"
                                    required="true"
                                    converter="#{conceptConverter}"
                                    forceSelection="true"
                                    scrollHeight="300"
                                    dropdown="true"/>
                </h2>
            </h:form>

            <p>ARK ID: #{bean.actionUnit.ark.arkId}</p>
            <!-- Button to access recording unit form -->
            <h:form>
                <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                <p:commandButton value="Nouvelle unité d'enregistrement"
                                 icon="pi pi-add"
                                 actionListener="#{panelManagerBean.addNewRecordingUnitPanel(bean.actionUnit)}"
                                 update="panelContainer"/>
            </h:form>


            <p:tabView id="spatialUnitTabsId">

                <p:tab title="Aperçu">

                </p:tab>

                <p:tab title="Détails" id="spatialUnitDetailsTabId">
                    <!-- Action codes (OA, OP, ...) -->
                    <h3>Manage Codes</h3>
                    <!-- The primary code attached to this action -->
                    <h4>Main code</h4>

                    <h:form id="primaryCodeForm">
                        <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>

                        <div style="display:flex;">
                            <p:chip label="#{bean.actionUnit.primaryActionCode.type.label}"
                                    icon="pi pi-qrcode" >
                            </p:chip>

                            <p:autoComplete id="auto-complete-primary-action-code"
                                            value="#{bean.actionUnit.primaryActionCode}"
                                            var="actionCode" itemLabel="#{actionCode.code}"
                                            completeMethod="#{bean.completeActionCode}"
                                            converter="#{actionCodeConverter}"
                                            itemValue="#{actionCode}"
                                            required="true"
                                            forceSelection="true"
                                            scrollHeight="300"
                                            dropdown="false">
                                <p:ajax event="itemSelect"
                                        update="@form"/>
                                <p:column>
                                    <div style="display:flex;">
                                        <span class="pi pi-qrcode ui-chip ui-chip-icon"/>
                                        <div style="width:max-content;" class="ui-chip-text">#{actionCode.type.label}
                                        </div>
                                    </div>

                                </p:column>
                                <p:column>
                                        <span>
                                            #{actionCode.code}
                                        </span>
                                </p:column>
                                <f:facet name="footer">
                                    <div class="ui-fluid" style="padding:0.5rem 1rem 1rem 1rem">
                                        <p:commandButton value='Nouveau code' icon="pi pi-plus"
                                                         action="#{bean.initNewActionCode(0)}"
                                                         update="form-new-action-code"
                                                         immediate="true"
                                                         oncomplete="PF('new-action-code-dialog').show()"
                                                         style="margin-right: .5rem">
                                        </p:commandButton>

                                    </div>
                                </f:facet>
                            </p:autoComplete>
                        </div>
                    </h:form>

                    <h4>Additional codes</h4>
                    <h:messages id="msg"></h:messages>
                    <h:form id="secondaryCodesForm">
                        <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                        <p:commandButton value="Add new code" icon="pi pi-plus" process="@this" update="secondaryCodesForm"
                                         action="#{bean.addNewSecondaryCode}"/>
                        <ui:repeat id="secondaryCodeRepeat" var="secondaryCode" value="#{bean.secondaryActionCodes}" varStatus="status">
                            <h:panelGroup style="display:flex;" id="secondaryCodeField">
                                <p:chip label="#{bean.secondaryActionCodes[status.index].type.label}"
                                        icon="pi pi-qrcode" >
                                </p:chip>
                                <p:autoComplete id="SecondaryCodeAutoCompleteId"
                                                value="#{bean.secondaryActionCodes[status.index]}"
                                                var="actionCode"
                                                itemLabel="#{actionCode.code}"
                                                completeMethod="#{bean.completeActionCode}"
                                                converter="#{actionCodeConverter}"
                                                itemValue="#{actionCode}"
                                                required="true"
                                                forceSelection="true"
                                                scrollHeight="300"
                                                dropdown="false">
                                    <!--                                    <p:ajax event="itemSelect"-->
                                    <!--                                            listener="#{bean.handleSelectPrimaryCode}"-->
                                    <!--                                          -->
                                    <p:ajax event="itemSelect"
                                            update="spatialUnitTabsId:secondaryCodesForm:secondaryCodeRepeat:#{status.index}:secondaryCodeField"/>
                                    />
                                    <p:column>
                                        <div style="display:flex;">
                                            <span class="pi pi-qrcode ui-chip ui-chip-icon"/>
                                            <div style="width:max-content;" class="ui-chip-text">#{actionCode.type.label}
                                            </div>
                                        </div>

                                    </p:column>
                                    <p:column>
                                        <span>
                                            #{actionCode.code}
                                        </span>
                                    </p:column>
                                    <f:facet name="footer">
                                        <div class="ui-fluid" style="padding:0.5rem 1rem 1rem 1rem">
                                            <p:commandButton value='Nouveau code' icon="pi pi-plus"
                                                             immediate="true"
                                                             update="form-new-action-code"
                                                             action="#{bean.initNewActionCode(status.index+1)}"
                                                             oncomplete="PF('new-action-code-dialog').show()"
                                                             style="margin-right: .5rem">
                                            </p:commandButton>

                                        </div>
                                    </f:facet>
                                </p:autoComplete>
                                <p:commandButton icon="pi pi-minus" process="@this" update="@form"
                                                 action="#{bean.removeSecondaryCode(status.index)}"/>
                            </h:panelGroup>
                        </ui:repeat>
                    </h:form>
                    <h:form>
                        <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                        <p:commandButton icon="pi pi-save" update="primaryCodeForm secondaryCodeForm main-growl"
                                         action="#{bean.save()}"/>
                    </h:form>


                </p:tab>

                <p:tab title="Hierarchie">

                </p:tab>

                <p:tab title="Equipe">

                </p:tab>

                <p:tab title="Enregistrements">

                </p:tab>

                <p:tab title="Prelevements">

                </p:tab>

            </p:tabView>

        </h:panelGroup>

        <!-- Tabs -->


        <ui:include src="../../dialog/actionUnit/newActionCodeDialog.xhtml"/>


    
</ui:fragment>
