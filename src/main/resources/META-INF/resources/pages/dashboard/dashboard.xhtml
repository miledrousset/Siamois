<?xml version="1.0" encoding="UTF-8"?>
<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:panel="http://xmlns.jcp.org/jsf/composite/pages/panel"
                xmlns:c="http://java.sun.com/jsp/jstl/core">

    <ui:define name="content">
        <div class="container-fluid">
            <div class="row">
                <div>

                    <h:panelGroup style="display:flex;flex-direction: column;gap:1em;" id="panelContainer">

                            <c:forEach items="#{panelManagerBean.panels}" var="panel" varStatus="status">
                                <p:panel id="panel-${status.index}" header="#{panel.title}" closable="true">

                                    <ui:include src="#{panel.display()}">
                                        <ui:param name="bean" value="#{panel}"/>
                                    </ui:include>
                                </p:panel>
                            </c:forEach>

                    </h:panelGroup>


                </div>
            </div>
        </div>
    </ui:define>

</ui:composition>
